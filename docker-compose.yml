version: '3.8'

services:
  portfolio:
    build: .
    container_name: achintya-portfolio
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    labels:
      - "com.achintya.description=Personal Portfolio Website"
      - "com.achintya.version=2.0"